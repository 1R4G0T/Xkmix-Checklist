<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XKMIX Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="captureArea" class="main-card">
        <h1 class="logo-gothic">XKMIX</h1>
        <p class="subtitle">Checklist de Abertura</p>
        
        <input type="text" id="unidade" placeholder="Unidade">
        <input type="text" id="responsavel" placeholder="Responsável">

        <div class="section-card">
            <h3>Salão</h3>
            <label class="item"><input type="checkbox"><span>Bandeira recolhida</span></label>
            <label class="item"><input type="checkbox"><span>Mesas e Cadeiras</span></label>
            <label class="item"><input type="checkbox"><span>Vidros Limpos</span></label>
            <label class="item"><input type="checkbox"><span>Lixeiras com saco de lixo</span></label>
            <label class="item"><input type="checkbox"><span>Chão limpo</span></label>
            <label class="item"><input type="checkbox"><span>Bancada de complemento limpa e devidamente fechada</span></label>
             <label class="item"><input type="checkbox"><span>Boleado e pote de agua limpos </span></label>
              <label class="item"><input type="checkbox"><span>Copos e MR Abastecidos</span></label>
        </div>

        <div class="section-card">
            <h3>Cozinha/Estoque</h3>
            <label class="item"><input type="checkbox"><span>Frutas Guardadas</span></label>
            <label class="item"><input type="checkbox"><span>Frutas Cortadas</span></label>
            <label class="item"><input type="checkbox"><span>Salgados Guardados</span></label>
            <label class="item"><input type="checkbox"><span>Leite Condensado</span></label>
            <label class="item"><input type="checkbox"><span>Chao limpo</span></label>
            <label class="item"><input type="checkbox"><span>Bancada limpa e condimentos trampados</span></label>
              <label class="item"><input type="checkbox"><span>Frizzer, Geladeira, Microondas Limpos</span></label>
              <label class="item"><input type="checkbox"><span>Cremes Mexidos</span></label>
        </div>

                <div class="section-card">
            <h3>Eletronicos e Sistema</h3>
                <label class="item"><input type="checkbox"><span>Caixa Fechado</span></label>
                        <label class="item"><input type="checkbox"><span>Nota do caixa do dia seguinte</span></label>
                        <label class="item"><input type="checkbox"><span>Antes de fecha o caixa, verificar as sangrias</span></label>
                        <label class="item"><input type="checkbox"><span>Desligar as maquinetas, as impresoras e as balanças</span></label>
                        <label class="item"><input type="checkbox"><span>Organizar a bancada</span></label>
                </div>

        <textarea id="obs" placeholder="Observações..." rows="3"></textarea>
    </div>

    <button class="floating-btn" onclick="gerarRelatorio()">Enviar Checklist</button>

    <script src="script.js"></script>
</body>
</html>
