<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XKMIX Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="captureArea" class="main-card">
        <h1 class="logo-gothic">XKMIX</h1>
        <p class="subtitle">Checklist de Abertura</p>
        
        <input type="text" id="unidade" placeholder="Unidade">
        <input type="text" id="responsavel" placeholder="Responsável">

        <div class="section-card">
            <h3>Salão</h3>
            <label class="item"><input type="checkbox"><span>Bandeira</span></label>
            <label class="item"><input type="checkbox"><span>Mesas e Cadeiras</span></label>
            <label class="item"><input type="checkbox"><span>Vidros Limpos</span></label>
            <label class="item"><input type="checkbox"><span>Lixeiras</span></label>
        </div>

        <div class="section-card">
            <h3>Cozinha/Estoque</h3>
            <label class="item"><input type="checkbox"><span>Frutas Cortadas</span></label>
            <label class="item"><input type="checkbox"><span>Cremes</span></label>
            <label class="item"><input type="checkbox"><span>Leite Condensado</span></label>
        </div>

        <textarea id="obs" placeholder="Observações..." rows="3"></textarea>
    </div>

    <button class="floating-btn" onclick="gerarRelatorio()">Enviar Checklist</button>

    <script src="script.js"></script>
</body>
</html>
